# DevBoard Application Configuration
# ===================================

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# ===================================
# Database Configuration
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/devboard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===================================
# JWT Configuration
# ===================================
app.jwtSecret=your-secret-key-change-this-in-production-at-least-32-characters-long
app.jwtExpirationMs=86400000

# ===================================
# GitHub Configuration
# ===================================
github.api.url=https://api.github.com
github.webhook.secret=your-github-webhook-secret-key
github.app.name=DevBoard

# ===================================
# Logging Configuration
# ===================================
logging.level.root=INFO
logging.level.com.devboard=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.file.name=logs/devboard.log
logging.file.max-size=10MB
logging.file.max-history=10

# ===================================
# Spring Security Configuration
# ===================================
spring.security.oauth2.client.registration.github.client-id=your-github-oauth-app-id
spring.security.oauth2.client.registration.github.client-secret=your-github-oauth-app-secret

# ===================================
# Jackson Configuration
# ===================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ===================================
# Actuator Configuration
# ===================================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when-authorized

# ===================================
# CORS Configuration
# ===================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# ===================================
# File Upload Configuration
# ===================================
app.upload.dir=uploads/
app.upload.max-file-size=10485760
app.upload.allowed-file-types=pdf,doc,docx,xls,xlsx,jpg,jpeg,png,gif

# ===================================
# Email Configuration (Optional)
# ===================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===================================
# Thread Pool Configuration
# ===================================
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=devboard-

# ===================================
# Cache Configuration
# ===================================
spring.cache.type=simple

# ===================================
# Actuator for Production Monitoring
# ===================================
management.metrics.export.prometheus.enabled=true
