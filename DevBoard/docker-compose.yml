version: '3.8'

services:
  # ============================================================
  # MySQL Database
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: devboard-mysql
    environment:
      MYSQL_ROOT_PASSWORD: devboard123
      MYSQL_DATABASE: devboard
      MYSQL_USER: devboard
      MYSQL_PASSWORD: devboard123
      TZ: 'UTC'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - devboard-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # ============================================================
  # Spring Boot Backend
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devboard-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/devboard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: devboard
      SPRING_DATASOURCE_PASSWORD: devboard123
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      APP_JWT_SECRET: dev-secret-key-change-in-production-at-least-32-characters-long
      APP_JWT_EXPIRATION_MS: 86400000
      GITHUB_WEBHOOK_SECRET: dev-webhook-secret
      SERVER_PORT: 8080
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_DEVBOARD: DEBUG
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/target
    networks:
      - devboard-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 10s

  # ============================================================
  # React Frontend (Optional - can be run with npm start)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devboard-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - devboard-network
    stdin_open: true
    tty: true

  # ============================================================
  # phpMyAdmin (Optional - for database management)
  # ============================================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: devboard-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: devboard
      PMA_PASSWORD: devboard123
      PMA_DB: devboard
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - devboard-network

volumes:
  mysql_data:
    driver: local

networks:
  devboard-network:
    driver: bridge

# ============================================================
# How to Use:
# ============================================================
# 1. Start all services:
#    docker-compose up -d
#
# 2. View logs:
#    docker-compose logs -f
#
# 3. Access services:
#    - Backend API: http://localhost:8080/api
#    - Frontend: http://localhost:3000
#    - phpMyAdmin: http://localhost:8081
#    - MySQL: localhost:3306
#
# 4. Stop all services:
#    docker-compose down
#
# 5. Stop and remove data:
#    docker-compose down -v
#
# ============================================================
